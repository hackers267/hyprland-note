# The URL the site will be built for
base_url = "https://hackers267.github.io/hyprland-note"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

title = "Hyprland"
theme = "blow"
default_language = "zh"

taxonomies = [
  { name = "tags", rss = true }
]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

[extra]
# Put all your custom variables here
enable_search = false
enable_multilingue = false
enable_sidebar = false
enable_navbar = true

[extra.navbar]
title = "Hyprland"
items = [
 { lang = "zh", links = [
   { url = "/", name = "主页" },
   { url = "/post", name = "文章" },
   { url = "/tags", name = "标签" }
  ]}
]

[extra.index]
title = "Hyprland"
image = "https://hyprland.org/ico/favicon-32x32.png"
image_alt = "hyprland"

[extra.default_author]
name = "silence_zhpf"
avatars = "https://avatars.githubusercontent.com/u/22020318?v=4"
avatars_alt = "silence_zhpf"

[extra.social]
github = "https://github.com/hackers267"
gitlab = false
twitter = false
linkedin = false
email = "silence_zhpf@aliyun.com"
stackoverflow = false
telegram = false
